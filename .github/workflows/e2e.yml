name: E2E

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  playwright:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify json-document registry contract
        run: >-
          pnpm exec vitest run src/canvas/host/document
          src/canvas/architecture/CanvasPackageManifest.test.ts

      - name: Install Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e
        run: pnpm test:e2e
